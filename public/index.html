<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLS Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="logo">
      <span class="logo-icon">▶</span>
      <span class="logo-text">STREAM<em>NATIVE</em></span>
    </div>
    <div class="header-tag">No iframe · No ads · Pure HLS</div>
  </header>

  <main>
    <!-- URL Input Panel -->
    <section class="input-panel">
      <div class="input-label">STREAM URL</div>
      <div class="input-row">
        <input
          id="streamUrl"
          type="text"
          placeholder="https://example.com/stream.m3u8"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="loadBtn" onclick="loadStream()">
          <span class="btn-text">LOAD</span>
          <span class="btn-icon">→</span>
        </button>
      </div>
      <div class="input-options">
        <label class="toggle-wrap">
          <input type="checkbox" id="useProxy" checked />
          <span class="toggle"></span>
          <span class="toggle-label">Gunakan Proxy (atasi CORS)</span>
        </label>
        <label class="toggle-wrap">
          <input type="checkbox" id="rewriteM3u8" checked />
          <span class="toggle"></span>
          <span class="toggle-label">Rewrite M3U8 Segments</span>
        </label>
      </div>
      <div id="statusBar" class="status-bar hidden"></div>
    </section>

    <!-- Player -->
    <section class="player-wrap">
      <div class="player-container" id="playerContainer">
        <div class="player-idle" id="playerIdle">
          <div class="idle-icon">◉</div>
          <div class="idle-text">Masukkan URL stream di atas untuk mulai</div>
        </div>
        <video id="video" playsinline></video>
        <div class="custom-controls" id="customControls">
          <div class="progress-wrap">
            <div class="progress-bg">
              <div class="progress-buffer" id="progressBuffer"></div>
              <div class="progress-fill" id="progressFill"></div>
              <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1" />
            </div>
          </div>
          <div class="controls-row">
            <div class="controls-left">
              <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">
                <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                <svg id="iconPause" viewBox="0 0 24 24" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              </button>
              <button class="ctrl-btn" onclick="skipTime(-10)">
                <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="15" font-size="6" text-anchor="middle" fill="currentColor">10</text></svg>
              </button>
              <button class="ctrl-btn" onclick="skipTime(10)">
                <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="15" font-size="6" text-anchor="middle" fill="currentColor">10</text></svg>
              </button>
              <div class="volume-wrap">
                <button class="ctrl-btn" onclick="toggleMute()">
                  <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                  <svg id="iconMute" viewBox="0 0 24 24" class="hidden"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <input type="range" id="volumeBar" min="0" max="1" value="1" step="0.05" oninput="setVolume(this.value)" />
              </div>
              <div class="time-display">
                <span id="timeNow">0:00</span>
                <span class="time-sep">/</span>
                <span id="timeDur">0:00</span>
              </div>
              <div class="live-badge hidden" id="liveBadge">● LIVE</div>
            </div>
            <div class="controls-right">
              <div class="quality-wrap" id="qualityWrap">
                <button class="ctrl-btn quality-btn" id="qualityBtn" onclick="toggleQualityMenu()">
                  <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                  <span id="qualityLabel">AUTO</span>
                </button>
                <div class="quality-menu hidden" id="qualityMenu"></div>
              </div>
              <button class="ctrl-btn" onclick="togglePiP()">
                <svg viewBox="0 0 24 24"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 16H3V4.98h18V19z"/></svg>
              </button>
              <button class="ctrl-btn" onclick="toggleFullscreen()">
                <svg id="iconFs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                <svg id="iconExit" viewBox="0 0 24 24" class="hidden"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <!-- Loading spinner -->
        <div class="spinner-wrap hidden" id="spinnerWrap">
          <div class="spinner"></div>
          <div class="spinner-text" id="spinnerText">Memuat stream...</div>
        </div>
        <!-- Error overlay -->
        <div class="error-overlay hidden" id="errorOverlay">
          <div class="error-icon">✕</div>
          <div class="error-msg" id="errorMsg">Gagal memuat stream</div>
          <button class="retry-btn" onclick="retryStream()">Coba Lagi</button>
        </div>
      </div>
    </section>

    <!-- Info Panel -->
    <section class="info-panel" id="infoPanel" style="display:none">
      <div class="info-grid">
        <div class="info-item">
          <div class="info-key">FORMAT</div>
          <div class="info-val" id="infoFormat">—</div>
        </div>
        <div class="info-item">
          <div class="info-key">RESOLUSI</div>
          <div class="info-val" id="infoRes">—</div>
        </div>
        <div class="info-item">
          <div class="info-key">BITRATE</div>
          <div class="info-val" id="infoBitrate">—</div>
        </div>
        <div class="info-item">
          <div class="info-key">DROPPED FRAMES</div>
          <div class="info-val" id="infoDropped">—</div>
        </div>
        <div class="info-item">
          <div class="info-key">BUFFER</div>
          <div class="info-val" id="infoBuffer">—</div>
        </div>
        <div class="info-item">
          <div class="info-key">LEVEL</div>
          <div class="info-val" id="infoLevel">—</div>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <span>Native HLS Player · Powered by HLS.js</span>
    <span class="footer-version">v1.0.0</span>
  </footer>

  <!-- HLS.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script src="/player.js"></script>

</body>
</html>
